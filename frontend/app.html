<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeOS — AI-Powered Healthcare Operating System</title>
  <meta name="description" content="LifeOS is your personal healthcare operating system.">
  <meta name="theme-color" content="#a4c3be">

  <!-- Favicon -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">

  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- QRCode.js -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <!-- Theme Toggle -->
  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Dark Mode" onclick="App.toggleTheme()">
    <span class="theme-icon-sun">☀️</span>
    <span class="theme-icon-moon">🌙</span>
  </button>

  <div class="app-container">

    <!-- ========== LEFT SIDEBAR ========== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo" onclick="App.navigate('dashboard')">
        <div class="logo-icon">
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 20px;">favorite</span>
        </div>
        <h2>LifeOS</h2>
      </div>

      <!-- General -->
      <div class="sidebar-section-label">General</div>
      <div class="sidebar-nav-item active" data-page="dashboard">
        <span style="display:flex; align-items:center;"><span class="nav-icon" style="background: rgba(59, 130, 246, 0.15); display: inline-flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 10px; margin-right: 12px; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">📊</span> Dashboard</span>
      </div>
      <div class="sidebar-nav-item" data-page="appointments">
        <span style="display:flex; align-items:center;"><span class="nav-icon" style="background: rgba(16, 185, 129, 0.15); display: inline-flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 10px; margin-right: 12px; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">📅</span> Appointments</span>
        <span class="nav-count" id="appointment-badge" style="display: none;"></span>
      </div>
      <div class="sidebar-nav-item" data-page="records">
        <span style="display:flex; align-items:center;"><span class="nav-icon" style="background: rgba(245, 158, 11, 0.15); display: inline-flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 10px; margin-right: 12px; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">📋</span> Records</span>
      </div>
      <div class="sidebar-nav-item" data-page="medicine">
        <span style="display:flex; align-items:center;"><span class="nav-icon" style="background: rgba(239, 68, 68, 0.15); display: inline-flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 10px; margin-right: 12px; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">💊</span> Medicines</span>
      </div>
      <div class="sidebar-nav-item" data-page="analytics">
        <span style="display:flex; align-items:center;"><span class="nav-icon" style="background: rgba(139, 92, 246, 0.15); display: inline-flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 10px; margin-right: 12px; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">📈</span> Statistics</span>
      </div>

      <!-- AI & Tools -->
      <div class="sidebar-section-label">Tools</div>
      <div class="sidebar-nav-item" data-page="ai-chat">
        <span style="display:flex; align-items:center;"><span class="nav-icon" style="background: rgba(6, 182, 212, 0.15); display: inline-flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 10px; margin-right: 12px; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">💬</span> AI Chat</span>
      </div>
      <div class="sidebar-nav-item" data-page="ai-symptom">
        <span style="display:flex; align-items:center;"><span class="nav-icon" style="background: rgba(236, 72, 153, 0.15); display: inline-flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 10px; margin-right: 12px; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">🔍</span> Symptom Checker</span>
      </div>
      <div class="sidebar-nav-item" data-page="ai-nutrition">
        <span style="display:flex; align-items:center;"><span class="nav-icon" style="background: rgba(16, 185, 129, 0.15); display: inline-flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 10px; margin-right: 12px; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">🥗</span> Nutrition</span>
      </div>
      <div class="sidebar-nav-item" data-page="ai-fitness">
        <span style="display:flex; align-items:center;"><span class="nav-icon" style="background: rgba(249, 115, 22, 0.15); display: inline-flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 10px; margin-right: 12px; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">🏋️</span> Fitness</span>
      </div>
      <div class="sidebar-nav-item" data-page="ai-mental">
        <span style="display:flex; align-items:center;"><span class="nav-icon" style="background: rgba(139, 92, 246, 0.15); display: inline-flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 10px; margin-right: 12px; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">🧠</span> Mental Health</span>
      </div>
      <div class="sidebar-nav-item" data-page="trackers">
        <span style="display:flex; align-items:center;"><span class="nav-icon" style="background: rgba(239, 68, 68, 0.15); display: inline-flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 10px; margin-right: 12px; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">❤️</span> Trackers</span>
      </div>
      <div class="sidebar-nav-item" data-page="settings">
        <span style="display:flex; align-items:center;"><span class="nav-icon" style="background: rgba(100, 116, 139, 0.15); display: inline-flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 10px; margin-right: 12px; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">⚙️</span> Settings</span>
      </div>
      <div class="sidebar-nav-item" data-page="emergency">
        <span style="display:flex; align-items:center;"><span class="nav-icon" style="background: rgba(220, 38, 38, 0.15); display: inline-flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 10px; margin-right: 12px; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">🆘</span> Emergency</span>
        <span class="nav-count" style="background:var(--danger); border-radius: 12px; padding: 2px 8px; font-size: 0.75rem;">SOS</span>
      </div>

      <!-- More nav (hidden in sidebar, accessible) -->
      <div class="sidebar-nav-item" data-page="family" style="display:none;">Family</div>
      <div class="sidebar-nav-item" data-page="challenges" style="display:none;">Challenges</div>
      <div class="sidebar-nav-item" data-page="expense" style="display:none;">Expenses</div>

      <!-- Logout -->
      <div class="sidebar-nav-item" onclick="App.logout()" style="color: var(--danger); margin-top: 10px;">
        <span style="display:flex; align-items:center;"><span class="nav-icon" style="background: rgba(220, 38, 38, 0.1); display: inline-flex; width: 32px; height: 32px; align-items: center; justify-content: center; border-radius: 10px; margin-right: 12px; font-size: 1.1rem;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg></span> Log out</span>
      </div>

      <!-- User -->
      <div class="sidebar-user" id="sidebar-user" onclick="App.navigate('settings')">
        <div class="user-avatar" id="sidebar-avatar">U</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-username">User</div>
          <div class="user-email" id="sidebar-email">user@lifeos.com</div>
        </div>
        <span class="user-chevron">▾</span>
      </div>
    </aside>

    <!-- ========== MAIN CONTENT (middle) ========== -->
    <main class="main-content">
      <div class="mobile-header" id="mobile-header">
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
        <span class="mobile-title">LifeOS</span>
        <button class="btn btn-sm" onclick="App.logout()" style="font-size:0.75rem;">Log out</button>
      </div>

      <div class="content-area">
        <section class="page-section active" id="page-dashboard"></section>
        <section class="page-section" id="page-records"></section>
        <section class="page-section" id="page-medicine"></section>
        <section class="page-section" id="page-appointments"></section>
        <section class="page-section" id="page-emergency"></section>
        <section class="page-section" id="page-family"></section>
        <section class="page-section" id="page-ai-chat"></section>
        <section class="page-section" id="page-ai-symptom"></section>
        <section class="page-section" id="page-ai-nutrition"></section>
        <section class="page-section" id="page-ai-fitness"></section>
        <section class="page-section" id="page-ai-mental"></section>
        <section class="page-section" id="page-analytics"></section>
        <section class="page-section" id="page-trackers"></section>
        <section class="page-section" id="page-challenges"></section>
        <section class="page-section" id="page-expense"></section>
        <section class="page-section" id="page-settings"></section>
      </div>
    </main>

    <!-- ========== RIGHT PANEL (third column) ========== -->
    <aside class="right-panel" id="right-panel">
      <!-- Populated by dashboard.js -->
    </aside>

  </div>

  <!-- Mobile Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ========== MODAL ========== -->
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this) Utils.closeModal()">
    <div class="modal">
      <div class="modal-header">
        <h3>Modal Title</h3>
        <button class="modal-close" onclick="Utils.closeModal()">✕</button>
      </div>
      <div class="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Utils.closeModal()">Cancel</button>
        <button class="btn btn-primary modal-save-btn">Save</button>
      </div>
    </div>
  </div>

  <!-- ========== TOAST ========== -->
  <div class="toast-container"></div>

  <!-- ========== SCRIPTS ========== -->
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <!-- Export Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/records.js"></script>
  <script src="js/medicine.js"></script>
  <script src="js/appointments.js"></script>
  <script src="js/emergency.js"></script>
  <script src="js/family.js"></script>
  <script src="js/ai-assistant.js"></script>
  <script src="js/ai-symptom.js"></script>
  <script src="js/ai-nutrition.js"></script>
  <script src="js/ai-fitness.js"></script>
  <script src="js/ai-mental.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/trackers.js"></script>
  <script src="js/challenges.js"></script>
  <script src="js/expense.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
